name: 🎟️ Lago Lago Monitor

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      send_status:
        description: 'Stuur een status-mail met de huidige situatie'
        required: false
        default: 'false'
        type: boolean

jobs:
  monitor:
    name: Check tickets
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Restore both the alert-state AND the price log
      - name: Restore state + log
        uses: actions/cache@v4
        with:
          path: |
            monitor_state.json
            price_log.csv
          key: monitor-data-${{ github.run_number }}
          restore-keys: |
            monitor-data-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run monitor
        env:
          EMAIL_APP_PASSWORD:  ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_FROM:          ${{ vars.EMAIL_FROM }}
          EMAIL_TO:            ${{ vars.EMAIL_TO }}
          PRICE_DROP_ALERT:    ${{ vars.PRICE_DROP_ALERT }}
          PRICE_HIGH_ALERT:    ${{ vars.PRICE_HIGH_ALERT }}
          LOW_STOCK_ALERT:     ${{ vars.LOW_STOCK_ALERT }}
          TICKETSWAP_URL:      ${{ vars.TICKETSWAP_URL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          # Manual trigger = always send status; schedule = only threshold alerts
          SEND_STATUS_REPORT:  ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python monitor.py

      # Save updated state + log for the next run
      - name: Save state + log
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            monitor_state.json
            price_log.csv
          key: monitor-data-${{ github.run_number }}
